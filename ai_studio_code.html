<style>

  html,body{margin:0;padding:0;overflow:hidden;background:#000;height:100%;
    font-family:'Segoe UI',Tahoma,Verdana,sans-serif; user-select:none; touch-action: none;}
  canvas{display:block;}
  .hidden{display:none !important;}

  /* Прицел */
  #crosshair{position:fixed;top:50%;left:50%;width:20px;height:20px;
    transform:translate(-50%,-50%);pointer-events:none;z-index:10;}
  #crosshair::before,#crosshair::after{content:'';position:absolute;background:#fff;box-shadow:0 0 2px #000;}
  #crosshair::before{left:9px;top:0;width:2px;height:20px;}
  #crosshair::after{top:9px;left:0;width:20px;height:2px;}

  /* Хотбар */
  #hotbar{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
    display:flex;gap:4px;z-index:10;}
  .slot{width:52px;height:52px;background:rgba(20,20,20,0.6);
    border:2px solid rgba(255,255,255,0.3);border-radius:4px;position:relative;
    background-repeat:no-repeat;background-size:70% 70%;background-position:center;
    image-rendering:pixelated;box-sizing:border-box;}
  .slot.selected{border-color:#fff;box-shadow:0 0 10px rgba(255,255,255,0.8);}
  .slot .count{position:absolute;bottom:1px;right:4px;color:#fff;font-size:12px;text-shadow:1px 1px 1px #000;}

  /* Мобильное управление */
  #mobileControls {position:fixed; inset:0; pointer-events:none; z-index:15;}
  .joystick-zone {position:absolute; bottom:20px; width:150px; height:150px; 
    background:rgba(255,255,255,0.05); border-radius:50%; pointer-events:auto; touch-action:none; border: 1px solid rgba(255,255,255,0.1);}
  #joyMove {left:20px;}
  #joyLook {right:20px;}
  .mobileActions {position:absolute; bottom:180px; right:30px; display:flex; flex-direction:column; gap:15px; pointer-events:auto;}
  .mBtn {width:60px; height:60px; border-radius:50%; background:rgba(0,0,0,0.5); color:white; 
    border:2px solid rgba(255,255,255,0.4); font-size:12px; display:flex; align-items:center; justify-content:center; text-transform:uppercase;}

  /* Оверлеи */
  #startScreen,#pauseMenu,#inventoryScreen{position:fixed;inset:0;display:flex;
    align-items:center;justify-content:center;flex-direction:column;
    background:rgba(6,8,14,0.85);color:#fff;z-index:20;gap:14px;text-align:center;}
  
  .menuBtn{background:#3a3a3a;color:#fff;border:1px solid #666;padding:12px 24px;
    font-size:15px;cursor:pointer;border-radius:4px;min-width:220px;}
  
  .settingRow{display:flex;align-items:center;gap:10px;font-size:14px;width:300px;justify-content:space-between;}
  input[type=range]{width:120px;}

  #invGrid{display:grid;grid-template-columns:repeat(9,52px);gap:4px;}
  @media (max-width: 700px) {
    #invGrid {grid-template-columns: repeat(6, 48px);}
    .slot {width: 48px; height: 48px;}
  }

  #cursorItem {position:fixed; width:52px; height:52px; pointer-events:none; z-index:100;
    background-repeat:no-repeat; background-size:70%; background-position:center; image-rendering:pixelated;}
  
  #miningBar{position:fixed;top:57%;left:50%;transform:translateX(-50%);
    width:120px;height:6px;background:rgba(0,0,0,0.5);border:1px solid #000;z-index:10;}
  #miningBar .fill{height:100%;width:0%;background:#fff;}
  #debug{position:fixed;top:8px;left:8px;color:#eee;background:rgba(0,0,0,0.4);padding:4px;font:10px monospace;z-index:10;pointer-events:none;}
</style>

<script type="module">
import * as THREE from "three";

/* --- КОНСТАНТЫ И БЛОКИ --- */
const CHUNK_SIZE = 16;
const CHUNK_HEIGHT = 64;
const BLOCK = { AIR:0, GRASS:1, DIRT:2, STONE:3, SAND:4, WOOD:5, LEAVES:6, WATER:7, COAL:8, IRON:9, DIAMOND:10, SNOW:11, BEDROCK:12, CACTUS:13 };

const BLOCK_DEF = {
  [BLOCK.GRASS]: { name:'Трава', hardness:0.6, faces:{top:'grass_top', bottom:'dirt', side:'grass_side'} },
  [BLOCK.DIRT]:  { name:'Земля', hardness:0.5, faces:{all:'dirt'} },
  [BLOCK.STONE]: { name:'Камень', hardness:1.5, faces:{all:'stone'} },
  [BLOCK.SAND]:  { name:'Песок', hardness:0.4, faces:{all:'sand'} },
  [BLOCK.WOOD]:  { name:'Дерево', hardness:1.0, faces:{top:'wood_top', bottom:'wood_top', side:'wood_side'} },
  [BLOCK.LEAVES]:{ name:'Листва', hardness:0.2, faces:{all:'leaves'} },
  [BLOCK.WATER]: { name:'Вода', solid:false, faces:{all:'water'} },
  [BLOCK.COAL]:  { name:'Уголь', hardness:1.5, faces:{all:'coal_ore'} },
  [BLOCK.IRON]:  { name:'Железо', hardness:2.0, faces:{all:'iron_ore'} },
  [BLOCK.DIAMOND]:{ name:'Алмаз', hardness:3.0, faces:{all:'diamond_ore'} },
  [BLOCK.SNOW]:  { name:'Снег', hardness:0.3, faces:{all:'snow_top'} },
  [BLOCK.BEDROCK]:{ name:'Бедрок', hardness:-1, faces:{all:'bedrock'} },
  [BLOCK.CACTUS]: { name:'Кактус', hardness:0.5, faces:{top:'cactus_top', bottom:'cactus_top', side:'cactus_side'} }
};

const RECIPES = [
  { input: [BLOCK.WOOD, null, null, null], output: { id: BLOCK.DIRT, count: 4 } },
  { input: [BLOCK.DIRT, BLOCK.DIRT, BLOCK.DIRT, BLOCK.DIRT], output: { id: BLOCK.GRASS, count: 1 } },
  { input: [BLOCK.SAND, BLOCK.SAND, null, null], output: { id: BLOCK.STONE, count: 1 } }
];

/* --- ГЕНЕРАЦИЯ ШУМА --- */
function mulberry32(s){
  return function(){
    s |= 0; s = (s + 0x6D2B79F5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

class Noise {
  constructor(seed){
    this.p = new Uint8Array(512);
    const r = mulberry32(seed);
    for(let i=0; i<256; i++) this.p[i] = i;
    for(let i=255; i>0; i--){ const j=Math.floor(r()*(i+1)); [this.p[i],this.p[j]]=[this.p[j],this.p[i]]; }
    for(let i=0; i<256; i++) this.p[i+256] = this.p[i];
  }
  fade(t){ return t*t*t*(t*(t*6-15)+10); }
  lerp(t,a,b){ return a+t*(b-a); }
  grad(h,x,y){ const i=h&15; return ((i<8?x:y)*(i&1?-1:1) + (i<4?y:(i===12||i===14?x:0))*(i&2?-1:1)); }
  noise(x,y){
    let X=Math.floor(x)&255, Y=Math.floor(y)&255;
    x-=Math.floor(x); y-=Math.floor(y);
    let u=this.fade(x), v=this.fade(y);
    const a=this.p[X]+Y, aa=this.p[a], ab=this.p[a+1], b=this.p[X+1]+Y, ba=this.p[b], bb=this.p[b+1];
    return this.lerp(v, this.lerp(u, this.grad(this.p[aa],x,y), this.grad(this.p[ba],x-1,y)), this.lerp(u, this.grad(this.p[ab],x,y-1), this.grad(this.p[bb],x-1,y-1)));
  }
}

/* --- ГРАФИЧЕСКИЙ АТЛАС --- */
const ATLAS_SIZE = 4;
const ATLAS_CELLS = {
  grass_top:[0,0], grass_side:[1,0], dirt:[2,0], stone:[3,0], sand:[0,1], wood_side:[1,1], wood_top:[2,1], 
  leaves:[3,1], water:[0,2], coal_ore:[1,2], iron_ore:[2,2], diamond_ore:[3,2], snow_top:[0,3], bedrock:[1,3], cactus_side:[2,3], cactus_top:[3,3]
};

function createAtlas(){
  const canvas = document.createElement('canvas'); canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  const colors = { 
    grass_top:'#5a8d32', grass_side:'#795548', dirt:'#5d4037', stone:'#757575', sand:'#dcb35c', 
    wood_side:'#795548', wood_top:'#a1887f', leaves:'#2e7d32', water:'#2196f3', coal_ore:'#424242', 
    iron_ore:'#d7ccc8', diamond_ore:'#80deea', snow_top:'#ffffff', bedrock:'#212121', cactus_side:'#1b5e20', cactus_top:'#4caf50' 
  };
  Object.keys(ATLAS_CELLS).forEach(key => {
    const [x,y] = ATLAS_CELLS[key];
    ctx.fillStyle = colors[key];
    ctx.fillRect(x*16, y*16, 16, 16);
    ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.strokeRect(x*16, y*16, 16, 16);
  });
  const tex = new THREE.CanvasTexture(canvas);
  tex.magFilter = THREE.NearestFilter; tex.minFilter = THREE.NearestFilter;
  return { tex, canvas };
}

/* --- МИР И ЧАНКИ --- */
class World {
  constructor(seed){
    this.seed = seed;
    this.noise = new Noise(seed);
    this.chunks = new Map();
    this.dirtyChunks = new Set();
  }
  getChunkKey(x,z){ return `${x},${z}`; }
  getBlock(x,y,z){
    const cx=Math.floor(x/16), cz=Math.floor(z/16);
    const chunk = this.chunks.get(this.getChunkKey(cx,cz));
    if(!chunk) return 0;
    const lx=x-cx*16, lz=z-cz*16;
    return chunk.data[lx + lz*16 + y*16*16] || 0;
  }
  setBlock(x,y,z,id){
    const cx=Math.floor(x/16), cz=Math.floor(z/16);
    const chunk = this.chunks.get(this.getChunkKey(cx,cz));
    if(!chunk) return;
    const lx=x-cx*16, lz=z-cz*16;
    chunk.data[lx + lz*16 + y*16*16] = id;
    this.dirtyChunks.add(this.getChunkKey(cx,cz));
  }
  generateChunk(cx,cz){
    const data = new Uint8Array(16*16*64);
    for(let x=0; x<16; x++){
      for(let z=0; z<16; z++){
        const h = Math.floor(this.noise.noise((cx*16+x)*0.05, (cz*16+z)*0.05)*10 + 20);
        for(let y=0; y<64; y++){
          let id = 0;
          if(y===0) id = BLOCK.BEDROCK;
          else if(y<h-3) id = BLOCK.STONE;
          else if(y<h) id = BLOCK.DIRT;
          else if(y===h) id = BLOCK.GRASS;
          else if(y<18) id = BLOCK.WATER;
          data[x + z*16 + y*256] = id;
        }
      }
    }
    const chunk = { cx, cz, data, mesh:null };
    this.chunks.set(this.getChunkKey(cx,cz), chunk);
    this.dirtyChunks.add(this.getChunkKey(cx,cz));
  }
}

/* --- ИГРОК --- */
class Player {
  constructor(world){
    this.world = world;
    this.pos = new THREE.Vector3(8, 30, 8);
    this.vel = new THREE.Vector3();
    this.onGround = false;
    this.input = { f:0, b:0, l:0, r:0, jump:false };
  }
  update(dt){
    // Гравитация
    this.vel.y -= 20 * dt;
    if(this.vel.y < -30) this.vel.y = -30;

    const speed = 5;
    const move = new THREE.Vector3();
    move.z = this.input.b - this.input.f;
    move.x = this.input.r - this.input.l;
    move.normalize().multiplyScalar(speed * dt);

    // Простая коллизия
    const nextPos = this.pos.clone().add(new THREE.Vector3(move.x, this.vel.y*dt, move.z));
    if(this.world.getBlock(Math.floor(nextPos.x), Math.floor(nextPos.y), Math.floor(nextPos.z)) === 0){
      this.pos.copy(nextPos);
      this.onGround = false;
    } else {
      if(this.vel.y < 0) this.onGround = true;
      this.vel.y = 0;
    }
    if(this.input.jump && this.onGround){ this.vel.y = 8; this.onGround = false; }
  }
}

/* --- ИНИЦИАЛИЗАЦИЯ ИГРЫ --- */
const settings = { sensitivity:1, fov:75, dist:3, mobile: /Android|iPhone/i.test(navigator.userAgent) };
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const { tex: atlasTex, canvas: atlasCanvas } = createAtlas();
const material = new THREE.MeshLambertMaterial({ map:atlasTex, vertexColors:false });
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(10, 50, 20);
scene.add(ambient, sun);

let world, player, inventory = new Array(36).fill(null), selectedSlot = 0, carriedItem = null;
let craftInput = new Array(4).fill(null), craftResult = null;
let gameActive = false, inventoryOpen = false;

/* --- ФУНКЦИИ ИНТЕРФЕЙСА --- */
function renderHotbar(){
  const hb = document.getElementById('hotbar'); hb.innerHTML = '';
  for(let i=0; i<9; i++){
    const slot = document.createElement('div');
    slot.className = `slot ${i===selectedSlot?'selected':''}`;
    if(inventory[i]){
      slot.style.backgroundImage = `url(${getBlockIcon(inventory[i].id)})`;
      slot.innerHTML = `<div class="count">${inventory[i].count>1?inventory[i].count:''}</div>`;
    }
    hb.appendChild(slot);
  }
}

function getBlockIcon(id){
  const def = BLOCK_DEF[id];
  const face = def.faces.all || def.faces.top || def.faces.side;
  const [tx, ty] = ATLAS_CELLS[face];
  const c = document.createElement('canvas'); c.width=16; c.height=16;
  c.getContext('2d').drawImage(atlasCanvas, tx*16, ty*16, 16, 16, 0, 0, 16, 16);
  return c.toDataURL();
}

function toggleInventory(){
  inventoryOpen = !inventoryOpen;
  document.getElementById('inventoryScreen').classList.toggle('hidden', !inventoryOpen);
  if(inventoryOpen){
    renderInventory();
    if(document.pointerLockElement) document.exitPointerLock();
  } else {
    if(carriedItem) { addItem(carriedItem.id, carriedItem.count); carriedItem = null; }
    renderCursor();
  }
}

function renderInventory(){
  const grid = document.getElementById('invGrid'); grid.innerHTML = '';
  inventory.forEach((item, idx) => {
    const s = document.createElement('div'); s.className='slot';
    if(item){
      s.style.backgroundImage = `url(${getBlockIcon(item.id)})`;
      s.innerHTML = `<div class="count">${item.count>1?item.count:''}</div>`;
    }
    s.onclick = () => handleSlotClick(idx);
    grid.appendChild(s);
  });
  renderCrafting();
}

function handleSlotClick(idx){
  const item = inventory[idx];
  if(!carriedItem && item){
    carriedItem = item; inventory[idx] = null;
  } else if(carriedItem){
    if(!item){ inventory[idx] = carriedItem; carriedItem = null; }
    else if(item.id === carriedItem.id){ item.count += carriedItem.count; carriedItem = null; }
    else { const tmp = item; inventory[idx] = carriedItem; carriedItem = tmp; }
  }
  renderInventory(); renderHotbar(); renderCursor();
}

function renderCursor(){
  const cur = document.getElementById('cursorItem');
  if(carriedItem){
    cur.classList.remove('hidden');
    cur.style.backgroundImage = `url(${getBlockIcon(carriedItem.id)})`;
    cur.innerHTML = `<div class="count">${carriedItem.count}</div>`;
  } else cur.classList.add('hidden');
}

function addItem(id, count){
  for(let i=0; i<36; i++){
    if(inventory[i] && inventory[i].id === id) { inventory[i].count += count; return; }
  }
  for(let i=0; i<36; i++){
    if(!inventory[i]) { inventory[i] = {id, count}; return; }
  }
}

function renderCrafting(){
  const cg = document.getElementById('craftGrid'); cg.innerHTML = '';
  craftInput.forEach((item, idx) => {
    const s = document.createElement('div'); s.className='slot';
    if(item) s.style.backgroundImage = `url(${getBlockIcon(item.id)})`;
    s.onclick = () => {
      const tmp = carriedItem; carriedItem = craftInput[idx]; craftInput[idx] = tmp;
      checkRecipes(); renderInventory(); renderCursor();
    };
    cg.appendChild(s);
  });
  const out = document.getElementById('craftOutput');
  out.innerHTML = ''; out.style.backgroundImage = '';
  if(craftResult){
    out.style.backgroundImage = `url(${getBlockIcon(craftResult.id)})`;
    out.innerHTML = `<div class="count">${craftResult.count}</div>`;
    out.onclick = () => {
      if(!carriedItem){
        carriedItem = {...craftResult}; 
        craftInput = craftInput.map(i => i ? (i.count>1?{...i, count:i.count-1}:null) : null);
        checkRecipes(); renderInventory(); renderCursor();
      }
    };
  }
}

function checkRecipes(){
  craftResult = null;
  for(const r of RECIPES){
    let match = true;
    for(let i=0; i<4; i++) if((r.input[i] || null) !== (craftInput[i]?.id || null)) match = false;
    if(match) { craftResult = {...r.output}; break; }
  }
}

/* --- СИСТЕМА ЧАНКОВ (МЕШИНГ) --- */
function updateChunkMesh(chunk){
  if(chunk.mesh) scene.remove(chunk.mesh);
  const geo = new THREE.BufferGeometry();
  const vertices = [], uvs = [];
  const faces = [
    {dir:[0,1,0], uv:'top'}, {dir:[0,-1,0], uv:'bottom'},
    {dir:[0,0,1], uv:'side'}, {dir:[0,0,-1], uv:'side'},
    {dir:[1,0,0], uv:'side'}, {dir:[-1,0,0], uv:'side'}
  ];

  for(let x=0; x<16; x++){
    for(let z=0; z<16; z++){
      for(let y=0; y<64; y++){
        const id = chunk.data[x+z*16+y*256];
        if(id === 0) continue;
        const def = BLOCK_DEF[id];
        
        faces.forEach(f => {
          const nx=x+f.dir[0], ny=y+f.dir[1], nz=z+f.dir[2];
          let neighbor = 0;
          if(nx<0||nx>=16||nz<0||nz>=16||ny<0||ny>=64) neighbor = world.getBlock(chunk.cx*16+nx, ny, chunk.cz*16+nz);
          else neighbor = chunk.data[nx+nz*16+ny*256];

          if(neighbor === 0 || neighbor === BLOCK.WATER){
            const x0=chunk.cx*16+x, y0=y, z0=chunk.cz*16+z;
            const pts = [];
            if(f.dir[1]!==0){ // Top/Bottom
               pts.push([x0,y0+(f.dir[1]>0?1:0),z0],[x0+1,y0+(f.dir[1]>0?1:0),z0],[x0+1,y0+(f.dir[1]>0?1:0),z0+1],[x0,y0+(f.dir[1]>0?1:0),z0+1]);
            } else if(f.dir[2]!==0){ // North/South
               pts.push([x0,y0,z0+(f.dir[2]>0?1:0)],[x0+1,y0,z0+(f.dir[2]>0?1:0)],[x0+1,y0+1,z0+(f.dir[2]>0?1:0)],[x0,y0+1,z0+(f.dir[2]>0?1:0)]);
            } else { // East/West
               pts.push([x0+(f.dir[0]>0?1:0),y0,z0],[x0+(f.dir[0]>0?1:0),y0,z0+1],[x0+(f.dir[0]>0?1:0),y0+1,z0+1],[x0+(f.dir[0]>0?1:0),y0+1,z0]);
            }
            vertices.push(...pts[0], ...pts[1], ...pts[2], ...pts[0], ...pts[2], ...pts[3]);
            
            const cell = def.faces.all || def.faces[f.uv];
            const [tx, ty] = ATLAS_CELLS[cell];
            const u=tx/ATLAS_SIZE, v=ty/ATLAS_SIZE, s=1/ATLAS_SIZE;
            uvs.push(u,v, u+s,v, u+s,v+s, u,v, u+s,v+s, u,v+s);
          }
        });
      }
    }
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.computeVertexNormals();
  chunk.mesh = new THREE.Mesh(geo, material);
  scene.add(chunk.mesh);
}

/* --- ВВОД (МЫШЬ + ТАЧ) --- */
const keys = {};
window.onkeydown = (e) => { 
  if(e.code === 'KeyE') toggleInventory();
  if(e.code === 'Escape') document.getElementById('pauseMenu').classList.toggle('hidden');
  keys[e.code] = true; 
};
window.onkeyup = (e) => keys[e.code] = false;

// Управление взглядом
let yaw = 0, pitch = 0;
document.addEventListener('mousemove', (e) => {
  if(document.pointerLockElement){
    yaw -= e.movementX * 0.002 * settings.sensitivity;
    pitch -= e.movementY * 0.002 * settings.sensitivity;
    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
  }
});

// Мобильные джойстики
function setupJoysticks(){
  const jm = document.getElementById('joyMove'), jl = document.getElementById('joyLook');
  let moveTouch = null, lookTouch = null;
  jm.ontouchstart = (e) => moveTouch = e.changedTouches[0];
  jm.ontouchmove = (e) => {
    const t = e.changedTouches[0];
    const rect = jm.getBoundingClientRect();
    const dx = (t.clientX - (rect.left + 75))/75, dy = (t.clientY - (rect.top + 75))/75;
    player.input.f = dy < -0.2 ? 1 : 0; player.input.b = dy > 0.2 ? 1 : 0;
    player.input.l = dx < -0.2 ? 1 : 0; player.input.r = dx > 0.2 ? 1 : 0;
  };
  jm.ontouchend = () => { player.input.f=0; player.input.b=0; player.input.l=0; player.input.r=0; };

  jl.ontouchmove = (e) => {
    const t = e.changedTouches[0];
    const rect = jl.getBoundingClientRect();
    yaw -= (t.clientX - (rect.left + 75)) * 0.0005;
    pitch -= (t.clientY - (rect.top + 75)) * 0.0005;
  };
}

/* --- ЛОГИКА ДОБЫЧИ И УСТАНОВКИ --- */
let mining = { active:false, x:0, y:0, z:0, progress:0 };
function updateMining(dt){
  if(keys['MouseDown'] || settings.mobileMouseDown){
    const ray = new THREE.Raycaster(camera.position, camera.getWorldDirection(new THREE.Vector3()));
    const hits = ray.intersectObjects(scene.children);
    if(hits.length > 0){
      const p = hits[0].point.clone().add(camera.getWorldDirection(new THREE.Vector3()).multiplyScalar(0.01));
      const bx=Math.floor(p.x), by=Math.floor(p.y), bz=Math.floor(p.z);
      const id = world.getBlock(bx,by,bz);
      if(id > 0){
        if(mining.x!==bx || mining.y!==by || mining.z!==bz) { mining = {active:true, x:bx, y:by, z:bz, progress:0}; }
        mining.progress += dt;
        const hard = BLOCK_DEF[id].hardness;
        document.getElementById('miningBar').classList.remove('hidden');
        document.getElementById('miningBar').querySelector('.fill').style.width = (mining.progress/hard*100)+'%';
        if(mining.progress >= hard && hard > 0){
           world.setBlock(bx,by,bz, 0);
           addItem(id, 1);
           mining.active = false;
           document.getElementById('miningBar').classList.add('hidden');
           renderHotbar();
        }
        return;
      }
    }
  }
  mining.active = false; document.getElementById('miningBar').classList.add('hidden');
}

function placeBlock(){
  const ray = new THREE.Raycaster(camera.position, camera.getWorldDirection(new THREE.Vector3()));
  const hits = ray.intersectObjects(scene.children);
  if(hits.length > 0 && inventory[selectedSlot]){
    const p = hits[0].point.clone().sub(camera.getWorldDirection(new THREE.Vector3()).multiplyScalar(0.01));
    const bx=Math.floor(p.x), by=Math.floor(p.y), bz=Math.floor(p.z);
    if(world.getBlock(bx,by,bz) === 0){
      world.setBlock(bx,by,bz, inventory[selectedSlot].id);
      inventory[selectedSlot].count--;
      if(inventory[selectedSlot].count <= 0) inventory[selectedSlot] = null;
      renderHotbar();
    }
  }
}

/* --- ГЛАВНЫЙ ЦИКЛ --- */
function animate(){
  requestAnimationFrame(animate);
  const dt = 0.016;

  if(gameActive && !inventoryOpen){
    if(!settings.mobile){
      player.input.f = keys['KeyW']?1:0; player.input.b = keys['KeyS']?1:0;
      player.input.l = keys['KeyA']?1:0; player.input.r = keys['KeyD']?1:0;
      player.input.jump = keys['Space']?1:0;
    }
    player.update(dt);
    camera.position.set(player.pos.x, player.pos.y + 1.6, player.pos.z);
    camera.rotation.set(pitch, yaw, 0, 'YXZ');
    
    // Подгрузка чанков
    const cx = Math.floor(player.pos.x/16), cz = Math.floor(player.pos.z/16);
    for(let i=-settings.dist; i<=settings.dist; i++){
      for(let j=-settings.dist; j<=settings.dist; j++){
        if(!world.chunks.has(world.getChunkKey(cx+i, cz+j))) world.generateChunk(cx+i, cz+j);
      }
    }
    
    // Обновление мешей
    if(world.dirtyChunks.size > 0){
      const key = world.dirtyChunks.values().next().value;
      updateChunkMesh(world.chunks.get(key));
      world.dirtyChunks.delete(key);
    }

    updateMining(dt);
  }
  renderer.render(scene, camera);
}

/* --- ОБРАБОТЧИКИ КНОПОК --- */
document.getElementById('btnNewGame').onclick = () => {
  world = new World(Math.random()*1000);
  player = new Player(world);
  inventory[0] = {id:BLOCK.WOOD, count:16};
  gameActive = true;
  document.getElementById('startScreen').classList.add('hidden');
  if(settings.mobile) {
     document.getElementById('mobileControls').classList.remove('hidden');
     setupJoysticks();
  } else {
     renderer.domElement.requestPointerLock();
  }
  renderHotbar();
  animate();
};

document.getElementById('btnResume').onclick = () => {
  document.getElementById('pauseMenu').classList.add('hidden');
  if(!settings.mobile) renderer.domElement.requestPointerLock();
};

document.getElementById('mBtnJump').ontouchstart = () => player.input.jump = true;
document.getElementById('mBtnJump').ontouchend = () => player.input.jump = false;
document.getElementById('mBtnPlace').ontouchstart = placeBlock;
document.getElementById('mBtnInv').ontouchstart = toggleInventory;
document.getElementById('btnCloseInv').onclick = toggleInventory;

window.onmousedown = (e) => { 
  if(e.button === 0) keys['MouseDown'] = true;
  if(e.button === 2) placeBlock();
};
window.onmouseup = (e) => { if(e.button === 0) keys['MouseDown'] = false; };
window.oncontextmenu = (e) => e.preventDefault();

document.getElementById('sensSlider').oninput = (e) => settings.sensitivity = e.target.value;
document.getElementById('fovSlider').oninput = (e) => { settings.fov = e.target.value; camera.fov = settings.fov; camera.updateProjectionMatrix(); };
document.getElementById('distSlider').oninput = (e) => settings.dist = parseInt(e.target.value);
document.getElementById('mobileToggle').onchange = (e) => {
  settings.mobile = e.target.checked;
  document.getElementById('mobileControls').classList.toggle('hidden', !settings.mobile);
  if(settings.mobile) setupJoysticks();
};

// Перетаскивание предмета в инвентаре
document.addEventListener('mousemove', (e) => {
  if(inventoryOpen && carriedItem){
    const cur = document.getElementById('cursorItem');
    cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px';
  }
});

// Колесо мыши для хотбара
window.onwheel = (e) => {
  selectedSlot = (selectedSlot + (e.deltaY > 0 ? 1 : -1) + 9) % 9;
  renderHotbar();
};

</script>
